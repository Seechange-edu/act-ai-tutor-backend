name: Dev

on:
    release:
      types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: get tag info
        uses: Seechange-edu/Parse-Action-Tag@main
        with:
          githubToken: ${{ secrets.ACTION_TOKEN }}
          type: parse

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: SeeChange-edu/${{ env.REPOSITORY }}
          token: ${{ secrets.ACTION_TOKEN }}
          ref: ${{ env.BRANCH }}

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup AWS ECR Details (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-ECR-Push
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-pf-aws-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Get ECR login token
        id: ecr-login-token
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ vars.AWS_REGION }})
          echo "token<<EOF" >> $GITHUB_OUTPUT
          echo "$ECR_TOKEN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Setup AWS ECR Details (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-ECR-Push
          aws-region: ${{ vars.AWS_REGION }}


      - name: Build and push Docker image with cache
        env:
          ECR_REGISTRY: ${{ steps.login-pf-aws-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          ACTIVE: ${{ env.ENVIRONMENT }}

        run: |
          docker buildx build \
            --file Dockerfile \
            --tag ${ECR_REGISTRY}/${ECR_REPOSITORY}/${ENVIRONMENT}:${ACTIVE} \
            --build-arg ENVIRONMENT=dev \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            --build-arg ENVIRONMENT=${{ env.ENVIRONMENT }} \
            --tag ${ECR_REGISTRY}/${ECR_REPOSITORY}/${ENVIRONMENT}:${ACTIVE} \
            --file Dockerfile \
            . \
            --push

      - name: Deploy to Remote Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          ECR_TOKEN: ${{ steps.ecr-login-token.outputs.token }}
          ECR_REGISTRY: ${{ steps.login-pf-aws-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          ACTIVE: ${{ env.ENVIRONMENT }}

        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,ACTIVE,ECR_TOKEN
          script: |
          
            # Login to AWS ECR using temporary token from GitHub Actions
            echo ${ECR_TOKEN} | docker login --username AWS --password-stdin ${ECR_REGISTRY}

            docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}/${ACTIVE}:${ACTIVE}
            if [ "$(docker ps -a --format '{{.Names}}' | grep -c ${{ env.NAME }})" -gt 0 ]; then 
              docker rm -f ${{ env.NAME }}
            fi
            docker run --name ${{ env.NAME }} -d \
              -p ${{ env.OUT_PORT }}:${{ env.PORT }} \
              --restart unless-stopped \
              -e ENVIRONMENT=${{ env.ENVIRONMENT }} \
              ${ECR_REGISTRY}/${ECR_REPOSITORY}/${ACTIVE}:${ACTIVE}
            docker image prune --force
            docker container prune --force

  notify-teams:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Teams Notification
        env:
          WEBHOOK: ${{ vars.TEAMS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "${{ needs.build.result == 'success' && '00FF00' || 'FF0000' }}",
            "summary": "${{ needs.build.result == 'success' && '🎉 Build succeeded!' || '❌ Build failed!' }}: ${{ github.workflow }}",
            "title": "${{ needs.build.result == 'success' && '🎉 Build succeeded!' || '❌ Build failed!' }}: ${{ github.workflow }}",
            "sections": [{
              "facts": [
                { "name": "Repository", "value": "${{ github.repository }}" },
                { "name": "Triggered by", "value": "${{ github.event_name }}" },
                { "name": "Commit Message", "value": "${{ github.event.head_commit.message }}" },
                { "name": "Author", "value": "@${{ github.actor }}" },
                { "name": "Result", "value": "${{ needs.build.result }}" }
              ],
              "text": "[View Workflow Run](${{ env.RUN_URL }})"
            }]
          }' \
          "$WEBHOOK"
